[package]
name = "glyphtex-tex-api"
version = "0.1.0"
edition = "2021"
description = "Typed API surface and TeX log parsing for the GlyphTeX TeX engine"
license = "MIT"
repository = "https://github.com/kanakkholwal/glyphtex"
readme = "README.md"
keywords = ["latex", "tex", "tectonic", "typesetting", "wasm"]
categories = ["text-processing", "parser-implementations", "api-bindings", "wasm"]
# bindings/ is ts-rs output regenerated by `cargo test`, and target/ is a build
# directory. rust-toolchain.toml pins the version this repo develops against and
# has no business dictating a consumer's toolchain.
exclude = ["bindings/", "target/", "rust-toolchain.toml", ".gitignore"]

# Deliberately free of C dependencies and of the engine itself, so it builds and
# tests on any host and for wasm32-unknown-unknown. That is what lets the
# TypeScript bindings be generated without the Emscripten toolchain.
[dependencies]
serde = { version = "1.0.229", features = ["derive"] }
ts-rs = "12.0.1"

[dev-dependencies]
serde_json = "1.0.151"

[lints.rust]
missing_docs = "deny"
