name: TeX engine

# Builds the Tectonic WASM engine, tests it end to end, and on a tag publishes
# both a GitHub Release and the @glyphx/tex-engine npm package.
# The engine is a single .wasm file, and the bundle is a tarball of the
# preloaded LaTeX format and all the packages it needs. 
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'packages/tex-engine/**'
      - '.github/workflows/tex-engine.yml'
    tags: ['tex-engine-v*']
  pull_request:
    paths:
      - 'crates/**'
      - 'packages/tex-engine/**'
  workflow_dispatch:

concurrency:
  group: tex-engine-${{ github.ref }}
  cancel-in-progress: true

env:
  # Must stay in step with crates/tectonic-wasm/rust-toolchain.toml — see the
  # note there. Emscripten 6 removed -sRELOCATABLE and changed the exception
  # and longjmp defaults, and newer rustc forces wasm exception handling; the
  # two only agree when both are pinned to the same era.
  EM_VERSION: 5.0.2
  CARGO_TERM_COLOR: always

jobs:
  # Fast feedback: the pure-Rust crate needs no C toolchain, so it fails in
  # under a minute rather than after the ~20-minute engine build.
  api:
    name: API crate + TypeScript types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # git stores the exec bit, but core.filemode=false (the usual Windows
      # setting) drops it silently, and the job then dies on a bare
      # "Permission denied" far from the cause.
      - name: Shell scripts are executable
        run: |
          if git ls-files -s '*.sh' | awk '$1 != "100755" { print "  " $4; found = 1 } END { exit !found }'; then
            echo "::error::The shell scripts above are not executable. Fix: git update-index --chmod=+x <file>"
            exit 1
          fi

      # Pinned, not @stable. Clippy gains lints every six weeks and this job
      # runs with -D warnings, so @stable turns an unrelated PR red whenever a
      # new lint fires on existing code. Bump this deliberately.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.94'
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/glyphx-tex-api

      - name: Format
        run: cargo fmt --check
        working-directory: crates/glyphx-tex-api

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: crates/glyphx-tex-api

      - name: Test
        run: cargo test
        working-directory: crates/glyphx-tex-api

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Regenerate TypeScript types
        run: |
          cd packages/tex-engine
          pnpm install --ignore-workspace --frozen-lockfile=false
          pnpm generate

      # The generated types are committed so consumers can build without a Rust
      # toolchain. If they drift from the Rust definitions, the two can
      # disagree silently — so treat drift as a failure.
      - name: Check generated types are up to date
        run: |
          if ! git diff --exit-code -- packages/tex-engine/src/generated; then
            echo "::error::Generated TypeScript is stale. Run 'pnpm generate' in packages/tex-engine and commit."
            exit 1
          fi

      - name: Typecheck wrapper
        run: cd packages/tex-engine && pnpm check

  engine:
    name: Build WASM engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Not @stable: the version is pinned in crates/tectonic-wasm/rust-toolchain.toml.
      # Installing stable here would download a second toolchain that rustup
      # then overrides on the first cargo call.
      #
      # rust-src is not optional — the build rebuilds std via -Zbuild-std so it
      # uses the same exception scheme as Emscripten's C++ ports. Without it the
      # build fails at the link with an undefined __cpp_exception.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.94'
          targets: wasm32-unknown-emscripten
          components: rust-src

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: emsdk-cache

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/tectonic-wasm

      # graphite2 is built from source by the build script; its cmake step is
      # the slowest part that never changes.
      - name: Cache Emscripten sysroot additions
        uses: actions/cache@v4
        with:
          path: |
            emsdk-cache/upstream/emscripten/cache/sysroot/lib/wasm32-emscripten/libgraphite2.a
            emsdk-cache/upstream/emscripten/cache/sysroot/include/graphite2
          key: graphite2-wasm-1.3.14-${{ env.EM_VERSION }}

      - name: Build
        run: ./scripts/build-wasm.sh
        working-directory: crates/tectonic-wasm

      # Enforced, not just reported: a warning in a summary nobody opens is no
      # check at all. Logic + limits live in the script so this file stays legible.
      - name: Check size budget
        run: ./scripts/check-size-budget.sh
        working-directory: crates/tectonic-wasm


      - uses: actions/upload-artifact@v4
        with:
          name: tectonic-wasm
          path: crates/tectonic-wasm/output/tectonic_wasm.wasm
          if-no-files-found: error

  test:
    name: End-to-end compile tests
    needs: engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tectonic-wasm
          path: crates/tectonic-wasm/output

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # The bundle — including the preloaded latex.fmt — is a committed data
      # input, not a build output: a TeX format is a memory image of the engine
      # that dumped it, so it is regenerated deliberately (pnpm
      # engine:bundle:format, needs a TeX Live install) rather than on every CI
      # run. Refreshing it means refreshing the packages from the same snapshot
      # too; a format older than its packages fails as "LaTeX kernel too old".
      - name: Extract TeX bundle
        run: |
          mkdir -p /tmp/bundle
          tar xzf crates/tectonic-wasm/output/tectonic-bundle.tar.gz -C /tmp/bundle

      - name: Build package
        run: |
          cd packages/tex-engine
          pnpm install --ignore-workspace --frozen-lockfile=false
          pnpm build

      # Fails if the bundle lacks anything bundle-manifest.json promises. The
      # installer offers those groups by name, so a gap here means the UI is
      # advertising something the engine cannot compile.
      - name: Verify bundle satisfies the manifest
        run: cd packages/tex-engine && pnpm bundle:verify /tmp/bundle

      # Two suites run here. compile.test.mjs covers the regressions the engine
      # rewrite exists to fix (booktabs used to hang; font-size changes emitted
      # a 15-byte PDF with no error). groups.test.mjs compiles a real document
      # for every package group, because a file being *present* in the bundle
      # does not mean the package *works* — that gap is how siunitx shipped
      # listed-but-broken.
      - name: Test
        env:
          GLYPHX_WASM: ${{ github.workspace }}/crates/tectonic-wasm/output/tectonic_wasm.wasm
          GLYPHX_BUNDLE: /tmp/bundle
          # Without this the suite skips when an artifact path is wrong and
          # `node --test` still exits 0 — a green job that ran zero tests.
          GLYPHX_REQUIRE_ENGINE: '1'
        run: cd packages/tex-engine && pnpm test

  release:
    name: Release + publish
    needs: [api, engine, test]
    if: startsWith(github.ref, 'refs/tags/tex-engine-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tectonic-wasm
          path: crates/tectonic-wasm/output

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#tex-engine-v}" >> "$GITHUB_OUTPUT"

      # No `pnpm generate` here: it shells out to `cargo test`, which would pull
      # an unpinned Rust into the release job to regenerate files that are
      # already committed and already drift-checked by the `api` job above.
      # sync:wasm stages the engine, the TeX bundle and the default packs.
      # Copying the wasm alone would publish a package whose `./bundle` export
      # points at nothing, and an engine with no format or classes cannot
      # typeset — it instantiates cleanly and fails on the first \documentclass.
      # prepublishOnly re-runs this and refuses to publish if anything is absent.
      - name: Build and stage package
        run: |
          cd packages/tex-engine
          pnpm install --ignore-workspace --frozen-lockfile=false
          pnpm build
          pnpm sync:wasm
          npm version "${{ steps.version.outputs.value }}" --no-git-tag-version

      - name: Publish to npm
        run: cd packages/tex-engine && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Compress engine for release
        run: brotli -q 11 -k crates/tectonic-wasm/output/tectonic_wasm.wasm

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            crates/tectonic-wasm/output/tectonic_wasm.wasm
            crates/tectonic-wasm/output/tectonic_wasm.wasm.br
            crates/tectonic-wasm/output/tectonic-bundle.tar.gz
          generate_release_notes: true
