name: Deploy web

# Builds and deploys the GlyphX web app (apps/web) to Cloudflare Workers via the
# SvelteKit Cloudflare adapter + wrangler (see apps/web/wrangler.jsonc, which
# binds the custom domain). Runs on pushes to `main` that touch apps/web (or
# shared packages), or manually via "Run workflow" / `gh workflow run
# deploy-web.yml`.
#
# Requires repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID. The
# deploy URL shown in the GitHub environment is the `WEB_DEPLOY_URL` repo
# variable (falls back to the wrangler custom domain).
on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'
      # The compiled engine ships as a static asset, so a new engine build is a
      # web change even though nothing under apps/web/ was touched.
      - 'crates/tectonic-wasm/output/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLIC_GA_ID: "G-X1BF4S5L5L"

jobs:
  deploy:
    name: Build & deploy to CF Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: ${{ vars.WEB_DEPLOY_URL || 'https://glyphx.nexonauts.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Wrangler 4.x requires Node >= 20; the repo pins >= 22.
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Format check (prettier)
      #   run: pnpm --filter @glyphx/web format:check

      # - name: Lint (eslint)
      #   run: pnpm --filter @glyphx/web lint:eslint

      # apps/web/static/engine/ is gitignored (it is ~18 MB of build output), so
      # it does not exist in a fresh checkout. Without this step the deploy
      # succeeds and every visitor gets a 404 on /engine/manifest.json, which
      # the app reports as "the compiler is not available offline yet" — a
      # broken editor from a green pipeline.
      #
      # No download needed: crates/tectonic-wasm/output/ is tracked, so this
      # only copies files the checkout already has.
      - name: Stage the TeX engine into static assets
        run: pnpm --filter @glyphx/web sync:engine

      - name: Typecheck (svelte-check)
        run: pnpm --filter @glyphx/web check

      - name: Build apps/web
        run: pnpm --filter @glyphx/web build
        env:
          NODE_ENV: production
          PUBLIC_GA_ID: ${{ env.PUBLIC_GA_ID }}
          # PUBLIC_TEXLIVE_ENDPOINT: ${{ vars.PUBLIC_TEXLIVE_ENDPOINT }}

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
