name: Deploy web

# Requires repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'
      # The compiled engine ships as a static asset, so a new engine build is a
      # web change even though nothing under apps/web/ was touched.
      - 'crates/tectonic-wasm/output/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLIC_GA_ID: "G-X1BF4S5L5L"

jobs:
  deploy:
    name: Build & deploy to CF Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: ${{ vars.WEB_DEPLOY_URL || 'https://glyphx.nexonauts.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Wrangler 4.x requires Node >= 20; the repo pins >= 22.
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (prettier)
        run: pnpm --filter @glyphx/web format:check

      - name: Lint (eslint)
        run: pnpm --filter @glyphx/web lint:eslint

      # static/engine/ is gitignored, so without this every visitor 404s on
      # /engine/manifest.json — a broken editor from a green pipeline.
      - name: Stage the TeX engine into static assets
        run: pnpm --filter @glyphx/web sync:engine

      # tex-engine.yml only tests a freshly built engine, so it cannot catch the
      # committed wasm drifting from the TypeScript wrapper that loads it.
      - name: Verify the staged engine actually compiles
        run: |
          pnpm --filter @glyphx/tex-engine build
          mkdir -p /tmp/engine-bundle
          tar -xzf crates/tectonic-wasm/output/tectonic-bundle.tar.gz -C /tmp/engine-bundle
          cd packages/tex-engine && pnpm test
        env:
          GLYPHX_WASM: ${{ github.workspace }}/apps/web/static/engine/tectonic_wasm.wasm
          GLYPHX_BUNDLE: /tmp/engine-bundle
          # Without this the suite SKIPS when an artifact is missing and exits 0,
          # which is indistinguishable from passing.
          GLYPHX_REQUIRE_ENGINE: '1'

      - name: Unit tests
        run: |
          pnpm --filter @glyphx/ui test
          pnpm --filter @glyphx/web test

      - name: Typecheck (svelte-check)
        run: pnpm --filter @glyphx/web check

      - name: Build apps/web
        run: pnpm --filter @glyphx/web build
        env:
          NODE_ENV: production
          PUBLIC_GA_ID: ${{ env.PUBLIC_GA_ID }}

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
